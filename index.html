<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CASH TRACKING SYSTEM</title>
<link rel="stylesheet" href="css/index.css">
</head>
<body>
<div class="sidebar">
 <h2>Cash System</h2>
  <ul>
   <li><a href="#" onclick="showPage('dashboardSection')">Dashboard</a></li>
   <li><a href="#" onclick="showPage('initialCapitalSection')">Initial Capital</a></li>
   <li><a href="#" onclick="showPage('chargeModal')">charges</a></li>
   <li><a href="#" onclick="showPage('addCapitalModal')">capital</a></li>
   <li><a href="#" onclick="showPage('commissionModal')">comission</a></li>
   <li><a href="#" onclick="showPage('chargesSection')">balance</a></li>
   <li><a href="#" onclick="showPage('reportsSection')">Reports</a></li>
  </ul>
</div>
<div class="main">
 <div class="topbar">
  <span>Welcome User</span>
  <button></button>
 </div>

  <div id="initialCapitalSection" class="page-content" style="display:none">
    <h3>Add Machine</h3>
    <div class="form-group">
      <label>Machine Name</label>
      <input type="text" id="machineName" >
    </div>
    <div class="form-group">
      <label>Float</label>
      <input type="number" id="float" oninput="formatNumber(this)" >
    </div>
    <div class="form-group">
      <label>Cash at Shop</label>
      <input type="number" id="shop" oninput="formatNumber(this)" >
    </div>
    <div class="form-group">
      <label>Cash at Home</label>
      <input type="number" id="home" oninput="formatNumber(this)" >
    </div>
    <button onclick="addMachine()">Add Machine</button>
    <h3>Machines List</h3>
    <table id="machineTable" border="1" width="100%">
      <thead>
        <tr>
          <th>Machine</th>
          <th>Float</th>
          <th>Shop</th>
          <th>Home</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
    <h3>Total Cash: <span id="totalCash">0</span> TZS</h3>
  </div>



  <div id="reportsSection" class="page-content" style="display:none">
    <h3>Reports</h3>
    <p>View reports of your cash flow and machines.</p>
  </div>
</div>




<script src="js/intialcapital.js"></script>
<script src="js/saveDailyBalance.js"></script>



</body>
</html>
